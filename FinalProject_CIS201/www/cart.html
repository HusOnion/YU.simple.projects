<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YETI - Cart</title>
    <link rel="stylesheet" href="./src/MyStyle.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="logo">
                <img src="./src/images/eyeslogo.png" alt="Logo">
            </a>

            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="products.html">Products</a>
                <a href="contact.html">Contact</a>
            </div>

            <a href="cart.html" class="cart">
                <img src="./src/images/cart.png" alt="Cart">
            </a>
            
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <h1>Shopping Cart</h1>
        <div id="cart-container">
            <div id="cart-items"></div>
            <div id="cart-summary" class="cart-summary">
                <h2>Order Summary</h2>
                <div class="summary-line">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-line">
                    <span>Shipping:</span>
                    <span id="shipping">Free</span>
                </div>
                <div class="summary-line total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
                <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button>
                <button id="empty-cart-btn" class="empty-cart-btn">Empty Cart</button>
                <a href="products.html" class="continue-shopping-btn">Continue Shopping</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Husam Sawaftah</p>
        <p>Web Design - Sara Al Sabeg</p>
        <p>&copy; Alyamamah University 2026</p>
    </footer>

    <script src="./src/Myjs.js"></script>
</body>
</html>
